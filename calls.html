<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyubexx Secure Hotline</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sip.js/0.20.0/sip.min.js"></script>
    <style>
        body {
            background-color: #0d0d11;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { max-width: 400px; padding: 20px; }
        .call-btn {
            background-color: #34c759;
            color: #ffffff;
            padding: 18px 45px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 20px rgba(52, 199, 89, 0.35);
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="call-btn" id="dialBtn" onclick="initiateHotline()">Connect Now</button>
    </div>

    <script>
        function initiateHotline() {
            const button = document.getElementById('dialBtn');
            button.innerHTML = "Connecting...";
            button.style.backgroundColor = "#ff9500";

            // Establish anonymous browser endpoint on Zadarma's open WebSocket gateway
            const options = {
                aor: "sip:anonymous@pbX.zadarma.com", // Replace pbX with your assigned Zadarma server prefix if needed
                media: { constraints: { audio: true, video: false } },
                userAgentOptions: { displayName: "Kyubexx Web Line" }
            };

            // Zadarma uses standard secure websockets for browser-to-sip handshakes
            const userAgent = new SIP.SimpleUser("wss://ws.zadarma.com", options);

            userAgent.connect().then(() => {
                // CHANGE THIS: Put your real 6-digit Zadarma SIP User ID here
                userAgent.call("sip:YOUR_SIP_USER_ID@sip.zadarma.com").catch(err => {
                    alert("Call connection dropped.");
                    console.error(err);
                    button.innerHTML = "Failed";
                    button.style.backgroundColor = "#ff3b30";
                });
                
                button.innerHTML = "Connected";
                button.style.backgroundColor = "#ff3b30";
            });
        }
    </script>

</body>
</html>
