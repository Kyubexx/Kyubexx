<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Received | Kyubexx Clothing</title>
    <style>
        :root {
            --primary-bg: #FFFFFF;
            --secondary-bg: #F9FAFB;
            --main-text: #111111;
            --muted-text: #6B7280;
            --border-color: #E5E7EB;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--main-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .success-card {
            max-width: 450px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: pop 0.4s ease-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 15px 0;
        }

        p {
            color: var(--muted-text);
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 0 0 30px 0;
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            background-color: var(--main-text);
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #333333;
        }

        @keyframes pop {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="icon">🎨</div>
    <h1>Request Logged</h1>
    <p>
        Your digital assets have been parsed successfully. High-fidelity layout renders will be generated and transmitted directly to your email alongside the payment request invoice shortly.
    </p>
    <a href="https://shop.kyubexx.com" class="btn">Back to Shop</a>
</div>

</body>
</html>
